<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adé Ijidakinro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0e0e10;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #7c6aff;
    --accent2: #c084fc;
    --text: #e8e6f0;
    --muted: #8884a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
  .orb1 { width: 400px; height: 400px; background: rgba(124,106,255,0.08); top: -100px; right: -100px; animation: drift1 20s ease-in-out infinite; }
  .orb2 { width: 300px; height: 300px; background: rgba(192,132,252,0.06); bottom: -80px; left: -80px; animation: drift2 25s ease-in-out infinite; }

  @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,30px)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-20px)} }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 520px;
    padding: 20px;
  }

  .avatar-wrap { position: relative; cursor: pointer; user-select: none; margin-bottom: 24px; }

  .avatar-ring {
    width: 160px; height: 160px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--accent));
    padding: 2px;
    animation: spin-ring 8s linear infinite;
    box-shadow: 0 0 40px rgba(124,106,255,0.3);
    transition: box-shadow 0.3s;
  }
  .avatar-ring:hover { box-shadow: 0 0 60px rgba(124,106,255,0.5); }
  .avatar-ring.talking { animation: spin-ring 2s linear infinite; box-shadow: 0 0 60px rgba(192,132,252,0.6); }
  @keyframes spin-ring { to { transform: rotate(360deg); } }

  .avatar-inner { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; background: var(--surface); }
  .avatar-inner img { width: 100%; height: 100%; object-fit: cover; object-position: center top; transform: scale(1.1); transition: transform 0.3s; }
  .avatar-ring:hover .avatar-inner img { transform: scale(1.15); }

  .pulse-dot {
    position: absolute; bottom: 8px; right: 8px;
    width: 14px; height: 14px; border-radius: 50%;
    background: #4ade80; border: 2px solid var(--bg);
    animation: pulse-green 2s ease-in-out infinite;
  }
  @keyframes pulse-green {
    0%,100% { box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(74,222,128,0); }
  }

  .name-block { text-align: center; margin-bottom: 28px; }
  .name {
    font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 30%, var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .tagline { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 4px; }

  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; width: 100%; justify-content: center; }
  .chip {
    font-family: 'Space Mono', monospace; font-size: 0.65rem;
    padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); background: var(--surface2); }

  .chat-window {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; height: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .chat-header {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; background: var(--surface2);
  }
  .chat-header-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse-green 2s infinite; }
  .chat-header-label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .chat-header-name { font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--text); margin-left: auto; }

  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg { display: flex; flex-direction: column; max-width: 85%; animation: msg-in 0.3s ease; }
  @keyframes msg-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }

  .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 0.82rem; line-height: 1.6; }
  .msg.user .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.assistant .msg-bubble { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

  .typing-indicator { display: flex; gap: 4px; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; border-bottom-left-radius: 4px; width: fit-content; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: typing 1.2s ease-in-out infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }

  .input-area { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--surface2); }
  .chat-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 0.78rem; outline: none; transition: border-color 0.2s; height: 42px;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--muted); }

  .send-btn {
    background: var(--accent); border: none; border-radius: 8px; width: 42px; height: 42px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s; flex-shrink: 0;
  }
  .send-btn:hover { background: var(--accent2); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 16px; height: 16px; fill: white; }

  .links { display: flex; gap: 16px; margin-top: 20px; }
  .link { font-size: 0.65rem; color: var(--muted); text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
  .link:hover { color: var(--accent2); }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
  <div class="avatar-wrap" onclick="focusInput()">
    <div class="avatar-ring" id="avatarRing">
      <div class="avatar-inner">
        <img id="avatarImg" src="" alt="Adé">
      </div>
    </div>
    <div class="pulse-dot"></div>
  </div>

  <div class="name-block">
    <div class="name">Adé Ijidakinro</div>
    <div class="tagline">Product Designer · Builder · Michigan HCI</div>
  </div>

  <div class="chips" id="chips">
    <div class="chip" onclick="sendChip('what have you built?')">what have you built?</div>
    <div class="chip" onclick="sendChip('tell me about Ehoro Village')">ehoro village</div>
    <div class="chip" onclick="sendChip('what do you believe about building?')">your philosophy</div>
    <div class="chip" onclick="sendChip('are you open to work?')">open to work?</div>
  </div>

  <div class="chat-window">
    <div class="chat-header">
      <div class="chat-header-dot"></div>
      <div class="chat-header-label">online</div>
      <div class="chat-header-name">Adé.ai</div>
    </div>
    <div class="messages" id="messages">
      <div class="msg assistant">
        <div class="msg-bubble">yo. i'm Adé — ask me anything. what i've built, what i think, what i'm working on. i'll keep it real.</div>
      </div>
    </div>
    <div class="input-area">
      <input class="chat-input" id="chatInput" placeholder="ask me anything..." onkeydown="handleKey(event)">
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <div class="links">
    <a class="link" href="https://ijidakinro.com" target="_blank">portfolio</a>
    <a class="link" href="https://ehorovillage.com" target="_blank">ehoro village</a>
    <a class="link" href="https://linkedin.com/in/adeijidakinro" target="_blank">linkedin</a>
    <a class="link" href="mailto:ijidakinroade@gmail.com">email</a>
  </div>
</div>

];

// ── Intent matching ───────────────────────────────────────────────────────────

function normalize(str) {
  return str.toLowerCase().replace(/[^a-z0-9 &]/g, ' ').trim();
}

function getResponse(input) {
  const q = normalize(input);
  let bestMatch = null;
  let bestScore = 0;

  for (const block of RESPONSES) {
    let score = 0;
    for (const key of block.keys) {
      if (q.includes(key)) {
        score += key.split(' ').length; // longer matches score higher
      }
    }
    if (score > bestScore) {
      bestScore = score;
      bestMatch = block;
    }
  }

  if (bestMatch && bestScore > 0) {
    const pool = bestMatch.replies;
    return pool[Math.floor(Math.random() * pool.length)];
  }

  return FALLBACKS[Math.floor(Math.random() * FALLBACKS.length)];
}

// ── UI ────────────────────────────────────────────────────────────────────────

function addMessage(role, content) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = content;
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing';
  div.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  document.getElementById('avatarRing').classList.add('talking');
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
  document.getElementById('avatarRing').classList.remove('talking');
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('chips').style.display = 'none';
  addMessage('user', text);

  showTyping();
  setTimeout(() => {
    hideTyping();
    addMessage('assistant', getResponse(text));
  }, 600 + Math.random() * 600);
}

function sendChip(text) {
  document.getElementById('chatInput').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
}

function focusInput() {
  document.getElementById('chatInput').focus();
}
